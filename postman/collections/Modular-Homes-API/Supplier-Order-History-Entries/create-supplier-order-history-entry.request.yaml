$kind: http-request
name: Create Supplier Order History Entry
method: POST
url: '{{baseUrl}}/api/supplier-order-history-entries'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "data": {
        "supplierOrder": "supplier-order-document-id",
        "message": "Order status changed to processing",
        "at": "2024-01-10T09:00:00.000Z",
        "meta": {
          "previousStatus": "pending",
          "newStatus": "processing"
        }
      }
    }
