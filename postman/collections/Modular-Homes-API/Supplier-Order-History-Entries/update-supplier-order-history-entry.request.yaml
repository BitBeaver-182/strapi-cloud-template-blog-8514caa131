order: 4000
pathVariables:
  - key: documentId
    value: ''
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "data": {
        "message": "Updated history entry message",
        "meta": {
          "updatedBy": "admin"
        }
      }
    }
