$kind: http-request
name: Update Order
method: PUT
url: '{{baseUrl}}/api/orders/:documentId'
order: 4000
pathVariables:
  - key: documentId
    value: ''
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "data": {
        "status": "published",
        "notes": "Updated order notes",
        "order_status": "partially_paid",
        "amount_paid": {
          "amount": 500,
          "currency_code": "USD"
        }
      }
    }
